# Production override for docker-compose.yml
# Usage:
#   cp .env.production.example .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    # Keep database internal in production.
    ports: []

  redis:
    # Keep Redis internal in production.
    ports: []

  backend:
    # Expose backend only through frontend reverse proxy.
    ports: []
    environment:
      ENVIRONMENT: production
      COOKIE_SECURE: "true"
      REDIS_REQUIRED: "true"
      # Force explicit CORS in production.
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env for production}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:?Set WHATSAPP_WEBHOOK_SECRET in .env for production}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    environment:
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
