# ═══════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml  –  IoT Healthcare Patient Monitor
#  Usage:   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: patient_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/migrations/v5_enterprise_upgrade.sql:/docker-entrypoint-initdb.d/02_v5_upgrade.sql
      - ./backend/migrations/v5_1_enterprise_patch.sql:/docker-entrypoint-initdb.d/03_v5_1_patch.sql
      - ./backend/migrations/v5_2_remove_blood_pressure.sql:/docker-entrypoint-initdb.d/04_v5_2_bp.sql
      - ./backend/migrations/v5_2_vitals_partitioning.sql:/docker-entrypoint-initdb.d/05_v5_2_partitioning.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Redis (rate limiter + pub/sub) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/patient_monitor
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DATA_SOURCE: ${DATA_SOURCE:-fake}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173,http://localhost:80}
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "true"
      SLA_THRESHOLD_SECONDS: "300"
      WS_CONNECTION_LIMIT: "50"
      ENVIRONMENT: production
      SERVICE_NAME: iot-backend
      LOG_LEVEL: INFO
      WHATSAPP_ENABLED: "true"
      GREEN_API_ID: ${GREEN_API_ID:-}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN:-}
      WHATSAPP_RECIPIENTS: ""
      # v5.2 new env vars
      WS_BROADCAST_MODE: "event"
      WS_MESSAGES_PER_MINUTE: "120"
      MAX_ALERTS_PER_MINUTE: "20"
      VITALS_RETENTION_DAYS: "30"
      # SENTRY_DSN: ""
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Standalone Scheduler ────────────────────────────────────────────────────
  scheduler:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/patient_monitor
      DATA_SOURCE: ${DATA_SOURCE:-fake}
      SERVICE_NAME: iot-scheduler
      WHATSAPP_ENABLED: "true"
      GREEN_API_ID: ${GREEN_API_ID:-}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN:-}
      WHATSAPP_RECIPIENTS: ""
      REDIS_URL: redis://redis:6379/0
    command: ["python", "scheduler.py"]

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
        REACT_APP_WS_BASE_URL: ${REACT_APP_WS_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nightly DB Backup (configurable retention) ───────────────────────────────
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATABASE: patient_monitor
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - dbbackups:/backups
    entrypoint: >
      sh -c "
        RETENTION_DAYS=$${BACKUP_RETENTION_DAYS:-7}
        echo \"Backup service started. Retention: $$RETENTION_DAYS days\"
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          echo \"Starting backup: $$TIMESTAMP\"
          pg_dump -Fc > /backups/patient_monitor_$$TIMESTAMP.dump
          echo \"Backup completed: /backups/patient_monitor_$$TIMESTAMP.dump\"
          # Delete backups older than retention period
          KEEP_COUNT=$$RETENTION_DAYS
          DELETED=$$(ls -t /backups/*.dump 2>/dev/null | tail -n +$$((KEEP_COUNT + 1)) | wc -l)
          ls -t /backups/*.dump 2>/dev/null | tail -n +$$((KEEP_COUNT + 1)) | xargs -r rm
          echo \"Cleanup: removed $$DELETED old backup(s), keeping last $$KEEP_COUNT\"
          # Sleep 24 hours
          sleep 86400
        done
      "

volumes:
  pgdata:
  redisdata:
  dbbackups:
