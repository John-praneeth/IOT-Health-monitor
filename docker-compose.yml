# ═══════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml  –  IoT Healthcare Patient Monitor
#  Usage:   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: john123
      POSTGRES_DB: patient_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DATA_SOURCE: fake
      CORS_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:5173"
    ports:
      - "8000:8000"

  # ── Scheduler (fake vitals generator) ───────────────────────────────────────
  scheduler:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      DATA_SOURCE: fake
    command: ["python", "scheduler.py"]

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
