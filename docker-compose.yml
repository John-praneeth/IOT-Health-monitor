# ═══════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml  –  IoT Healthcare Patient Monitor v5.2
#  Usage:   docker compose up --build
#  Scale:   docker compose up --scale backend=3 --scale celery-worker=3
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: john123
      POSTGRES_DB: patient_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/migrations/v5_enterprise_upgrade.sql:/docker-entrypoint-initdb.d/02_v5_upgrade.sql
      - ./backend/migrations/v5_1_enterprise_patch.sql:/docker-entrypoint-initdb.d/03_v5_1_patch.sql
      - ./backend/migrations/v5_2_remove_blood_pressure.sql:/docker-entrypoint-initdb.d/04_v5_2_bp.sql
      - ./backend/migrations/v5_2_vitals_partitioning.sql:/docker-entrypoint-initdb.d/05_v5_2_partitioning.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Redis (broker for Celery + rate limiter + pub/sub) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DATA_SOURCE: fake
      CORS_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:5173,http://localhost:80"
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "true"
      SLA_THRESHOLD_SECONDS: "300"
      WS_CONNECTION_LIMIT: "50"
      ENVIRONMENT: production
      SERVICE_NAME: iot-backend
      LOG_LEVEL: INFO
      WHATSAPP_ENABLED: "true"
      # v5.2 new env vars
      WS_BROADCAST_MODE: "event"
      WS_MESSAGES_PER_MINUTE: "120"
      MAX_ALERTS_PER_MINUTE: "20"
      VITALS_RETENTION_DAYS: "30"
      # GREEN_API_ID: ""
      # GREEN_API_TOKEN: ""
      # WHATSAPP_RECIPIENTS: ""
      # SENTRY_DSN: ""
    ports:
      - "8000:8000"

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      REDIS_URL: redis://redis:6379/0
      DATA_SOURCE: fake
      SLA_THRESHOLD_SECONDS: "300"
      SERVICE_NAME: iot-celery-worker
      LOG_LEVEL: INFO
      WHATSAPP_ENABLED: "true"
      MAX_ALERTS_PER_MINUTE: "20"
      VITALS_RETENTION_DAYS: "30"
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  # ── Celery Beat (periodic task scheduler) ───────────────────────────────────
  celery-beat:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      REDIS_URL: redis://redis:6379/0
      DATA_SOURCE: fake
      SLA_THRESHOLD_SECONDS: "300"
      SERVICE_NAME: iot-celery-beat
      LOG_LEVEL: INFO
      WHATSAPP_ENABLED: "true"
      VITALS_RETENTION_DAYS: "30"
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]

  # ── Standalone Scheduler (alternative to Celery — use one or the other) ────
  scheduler:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:john123@db:5432/patient_monitor
      DATA_SOURCE: fake
      SERVICE_NAME: iot-scheduler
      WHATSAPP_ENABLED: "true"
    command: ["python", "scheduler.py"]
    profiles:
      - legacy

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    depends_on:
      - backend
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # ── Nightly DB Backup (configurable retention) ───────────────────────────────
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: john123
      PGDATABASE: patient_monitor
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - dbbackups:/backups
    entrypoint: >
      sh -c "
        RETENTION_DAYS=$${BACKUP_RETENTION_DAYS:-7}
        echo \"Backup service started. Retention: $$RETENTION_DAYS days\"
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          echo \"Starting backup: $$TIMESTAMP\"
          pg_dump -Fc > /backups/patient_monitor_$$TIMESTAMP.dump
          echo \"Backup completed: /backups/patient_monitor_$$TIMESTAMP.dump\"
          # Delete backups older than retention period
          KEEP_COUNT=$$RETENTION_DAYS
          DELETED=$$(ls -t /backups/*.dump 2>/dev/null | tail -n +$$((KEEP_COUNT + 1)) | wc -l)
          ls -t /backups/*.dump 2>/dev/null | tail -n +$$((KEEP_COUNT + 1)) | xargs -r rm
          echo \"Cleanup: removed $$DELETED old backup(s), keeping last $$KEEP_COUNT\"
          # Sleep 24 hours
          sleep 86400
        done
      "

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
  dbbackups:
